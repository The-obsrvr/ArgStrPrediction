# run config
experiment:
  name: "ms_llm"
  seed: 42
  log_level: "INFO"
  debug_llm_io: true

model:
  do_fine_tuning: false
  model_name_or_path: "openai/gpt-oss-20b"

finetuning:
  data_path: ""
  epochs: 10
  batch_size: 32
  learning_rate: 0.001

inference:
  data_path: ""
  model_name_or_path: "openai/gpt-oss-20b"
  context_examples_path: ""
  num_context_examples: 0
  max_attempts: 2
  max_tokens: 4096
  temperature: 0.1
  repetition_penalty: 1.0
  repeat_instructions: false